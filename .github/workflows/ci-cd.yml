name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: localhost:5000
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_WORKER: ${{ github.repository }}/worker
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python linting tools
        run: |
          pip install flake8

      - name: Lint Python code
        run: |
          flake8 api/main.py --ignore=E501,W503,E302,E305,W292
          flake8 worker/worker.py --ignore=E501,W503,E302,E305,W292

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ESLint
        run: |
          cd frontend
          npm install -g eslint@8
          npm install

      - name: Lint JavaScript code
        run: |
          cd frontend
          eslint app.js

      - name: Install Hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd api
          pip install pytest pytest-cov
          pytest test_main.py --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t $REGISTRY/api:${{ github.sha }} -t $REGISTRY/api:latest ./api
          docker push $REGISTRY/api:${{ github.sha }}
          docker push $REGISTRY/api:latest

      - name: Build Worker image
        run: |
          docker build -t $REGISTRY/worker:${{ github.sha }} -t $REGISTRY/worker:latest ./worker
          docker push $REGISTRY/worker:${{ github.sha }}
          docker push $REGISTRY/worker:latest

      - name: Build Frontend image
        run: |
          docker build -t $REGISTRY/frontend:${{ github.sha }} -t $REGISTRY/frontend:latest ./frontend
          docker push $REGISTRY/frontend:${{ github.sha }}
          docker push $REGISTRY/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images locally
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Scan API image
        run: |
          trivy image --format sarif --output api-scan.sarif api:${{ github.sha }}
          trivy image --severity CRITICAL api:${{ github.sha }} || exit 1

      - name: Scan Worker image
        run: |
          trivy image --format sarif --output worker-scan.sarif worker:${{ github.sha }}
          trivy image --severity CRITICAL worker:${{ github.sha }} || exit 1

      - name: Scan Frontend image
        run: |
          trivy image --format sarif --output frontend-scan.sarif frontend:${{ github.sha }}
          trivy image --severity CRITICAL frontend:${{ github.sha }} || exit 1

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            api-scan.sarif
            worker-scan.sarif
            frontend-scan.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t hng14-stage2-devops-api:latest ./api
          docker build -t hng14-stage2-devops-worker:latest ./worker
          docker build -t hng14-stage2-devops-frontend:latest ./frontend

      - name: Start services
        run: |
          docker compose up -d

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done'

      - name: Check service status
        run: |
          docker compose ps
          docker compose logs

      - name: Submit job
        run: |
          response=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $response"
          job_id=$(echo $response | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
          echo "JOB_ID=$job_id" >> $GITHUB_ENV

      - name: Poll job status
        run: |
          for i in {1..30}; do
            status=$(curl -s http://localhost:3000/status/$JOB_ID | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            if [ "$status" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build new images
        run: |
          docker build -t hng14-stage2-devops-api:new ./api
          docker build -t hng14-stage2-devops-worker:new ./worker
          docker build -t hng14-stage2-devops-frontend:new ./frontend

      - name: Deploy API with rollback
        run: |
          # Stop old container
          docker compose stop api
          # Start new container
          docker compose up -d api
          # Wait for health check
          timeout 60 bash -c 'until docker ps --filter "name=api" --format "{{.Status}}" | grep -q "healthy"; do sleep 2; done' || {
            echo "New API container failed health check, rolling back"
            docker compose down api
            docker build -t hng14-stage2-devops-api:latest ./api
            docker compose up -d api
            exit 1
          }
          # Tag new as latest
          docker tag hng14-stage2-devops-api:new hng14-stage2-devops-api:latest

      - name: Deploy Worker with rollback
        run: |
          docker compose stop worker
          docker compose up -d worker
          timeout 60 bash -c 'until docker ps --filter "name=worker" --format "{{.Status}}" | grep -q "healthy"; do sleep 2; done' || {
            echo "New Worker container failed health check, rolling back"
            docker compose down worker
            docker build -t hng14-stage2-devops-worker:latest ./worker
            docker compose up -d worker
            exit 1
          }
          docker tag hng14-stage2-devops-worker:new hng14-stage2-devops-worker:latest

      - name: Deploy Frontend with rollback
        run: |
          docker compose stop frontend
          docker compose up -d frontend
          timeout 60 bash -c 'until docker ps --filter "name=frontend" --format "{{.Status}}" | grep -q "healthy"; do sleep 2; done' || {
            echo "New Frontend container failed health check, rolling back"
            docker compose down frontend
            docker build -t hng14-stage2-devops-frontend:latest ./frontend
            docker compose up -d frontend
            exit 1
          }
          docker tag hng14-stage2-devops-frontend:new hng14-stage2-devops-frontend:latest

      - name: Verify deployment
        run: |
          docker compose ps
